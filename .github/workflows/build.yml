name: TizenTube Linux ARM64 Auto-Build (Swap Memory Fixed)

on:
  workflow_dispatch: # Cho phép bấm nút chạy thủ công

# Ép toàn bộ các công cụ và bộ nhớ đệm di cư sang phân vùng lớn, tránh nghẽn Root
env:
  CCACHE_DIR: ${{ github.workspace }}/.ccache
  CIPD_CACHE_DIR: ${{ github.workspace }}/.cipd_cache
  VPYTHON_VIRTUALENV_ROOT: ${{ github.workspace }}/.vpython_cache
  TMPDIR: ${{ github.workspace }}/tmp

jobs:
  build-arm64:
    runs-on: ubuntu-latest

    steps:
    - name: "🧹 Dọn dẹp ổ cứng lấy 85GB trống (Để lại 15GB cho Root thở)"
      uses: easimon/maximize-build-space@v10
      with:
        root-reserve-mb: 15360 # Giữ lại 15GB trên Root tránh nghẹt log hệ thống
        temp-reserve-mb: 1024
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'
        remove-codeql: 'true'
        remove-docker-images: 'true'

    - name: "💾 Bước 1.5: Tạo Swap File 12GB chống tràn RAM (OOM)"
      run: |
        echo "⚙️ Đang khởi tạo RAM ảo 12GB..."
        sudo fallocate -l 12G ${{ github.workspace }}/swapfile
        sudo chmod 600 ${{ github.workspace }}/swapfile
        sudo mkswap ${{ github.workspace }}/swapfile
        sudo swapon ${{ github.workspace }}/swapfile
        echo "✅ Đã kích hoạt Swap thành công! Kiểm tra bộ nhớ hiện tại:"
        free -h

    - name: "📥 Bước 1: Tải Repo Mod của bạn (starfish367/tizentube-linux)"
      uses: actions/checkout@v4
      with:
        path: custom-repo

    - name: "🛠️ Bước 2: Cài đặt Toolchain & ccache (Đã thêm gperf, bison, flex)"
      run: |
        sudo apt update
        sudo apt install -y git python3 python3-pip curl build-essential clang llvm lld ninja-build gcc-aarch64-linux-gnu g++-aarch64-linux-gnu ccache gperf bison flex

    - name: "💾 Bước 3: Khôi phục Cache cũ từ Workspace"
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/.ccache
        key: cobalt-arm64-ccache-${{ github.run_id }}-${{ github.run_number }}
        restore-keys: |
          cobalt-arm64-ccache-

    - name: "⚙️ Bước 4: Khởi tạo các thư mục tạm trên Workspace"
      run: |
        mkdir -p $TMPDIR
        mkdir -p $CCACHE_DIR
        ccache --max-size=8G
        ccache --set-config=compression=true

    - name: "🌐 Bước 5: Tải depot_tools của Google"
      run: |
        git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git $GITHUB_WORKSPACE/depot_tools
        echo "$GITHUB_WORKSPACE/depot_tools" >> $GITHUB_PATH

    - name: "📦 Bước 6: Đồng bộ nguồn TizenTubeCobalt vào Workspace"
      run: |
        mkdir -p $GITHUB_WORKSPACE/cobalt-build
        cd $GITHUB_WORKSPACE/cobalt-build
        
        # 1. Chỉ lấy duy nhất code bản mới nhất của repo chính
        git clone --depth=1 https://github.com/reisxd/TizenTubeCobalt.git src
        
        # 2. Tạo file cấu hình .gclient chuẩn
        cat <<EOF > .gclient
        solutions = [
          {
            "name": "src",
            "url": "https://github.com/reisxd/TizenTubeCobalt.git",
            "deps_file": "DEPS",
            "managed": False,
          },
        ]
        target_os = ["linux"]
        EOF
        
        # 3. Đồng bộ hóa nguồn siêu tốc
        gclient sync --force --no-history

    - name: "🛠️ Bước 7: TIẾN HÀNH ĐÈ FILE MOD & SỬA LỖI CODE REPO GỐC"
      run: |
        SED_TARGET="$GITHUB_WORKSPACE/cobalt-build/src"
        echo "⚙️ Vô hiệu hóa Auto-Update..."
        find $SED_TARGET -name "*.js" -exec_sed -i 's/checkForUpdates/function(){return false;}/g' {} +
        find $SED_TARGET -name "*.js" -exec_sed -i 's/checkUpdate/function(){return false;}/g' {} +
        find $SED_TARGET -name "*.js" -exec_sed -i 's|api.github.com/repos/reisxd/TizenTubeCobalt/releases|api.github.com/repos/starfish367/tizentube-linux/releases|g' {} +
        
        echo "🔥 PHẪU THUẬT TRIỆT ĐỂ: Sửa lỗi ghim Android bằng câu lệnh điều kiện..."
        BUGGY_GN="$SED_TARGET/third_party/blink/renderer/modules/cobalt/h5vcc_tizen_tube/BUILD.gn"
        if [ -f "$BUGGY_GN" ]; then
          # Thay thế deps cứng thành đoạn code điều kiện chuẩn chỉ cho cả Android và Linux
          cat << 'EOF' > "$BUGGY_GN"
          # Copyright 2024 The Cobalt Authors. All Rights Reserved.
          #
          # Licensed under the Apache License, Version 2.0 (the "License");
          # you may not use this file except in compliance with the License.
          # You may obtain a copy of the License at
          #
          #     http://www.apache.org/licenses/LICENSE-2.0
          #
          # Unless required by applicable law or agreed to in writing, software
          # distributed under the License is distributed on an "AS IS" BASIS,
          # WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND, either express or implied.
          # See the License for the specific language governing permissions and
          # limitations under the License.

          target(starboard_level_gtest_target_type, "h5vcc_tizen_tube") {
            sources = [
              "h5vcc_tizen_tube.cc",
              "h5vcc_tizen_tube.h",
            ]

            deps = [
              "//cobalt/browser/h5vcc_tizentube/public/mojom:mojom_blink",
            ]

            if (is_android) {
              deps += [ "//starboard/android/shared:starboard_platform" ]
            }
          }
          EOF
          echo "✅ Đã áp dụng bản vá lỗi xịn xò 10/10!"
        fi

        if [ -f "$GITHUB_WORKSPACE/custom-repo/custom_files/key_mapping.cc" ]; then
          echo "🎮 Đang đè file key_mapping.cc tùy biến..."
          cp $GITHUB_WORKSPACE/custom-repo/custom_files/key_mapping.cc $GITHUB_WORKSPACE/cobalt-build/src/starboard/shared/x11/key_mapping.cc
        fi

    - name: "🏗️ Bước 8: Tải Sysroot ARM64 & Tạo cấu hình GN"
      run: |
        cd $GITHUB_WORKSPACE/cobalt-build/src
        # Tải gói thư viện sysroot arm64
        python3 build/linux/sysroot_scripts/install-sysroot.py --arch=arm64
        # Tiến hành gen file build (Khóa mõm check include + Tắt remote_exec)
        python3 cobalt/build/gn.py -p evergreen-arm64 -c gold --no-check --args="ccache_enable=true use_remoteexec=false"

    - name: "🔥 Bước 9: Bắt đầu Biên dịch (Compile bằng Ninja)"
      run: |
        cd $GITHUB_WORKSPACE/cobalt-build/src
        export CC="ccache clang"
        export CXX="ccache clang++"
        # Gọi trực tiếp Ninja của hệ thống Ubuntu để chặn đứng trò hề của depot_tools
        /usr/bin/ninja -j $(nproc) -C out/evergreen-arm64_gold/ cobalt

    - name: "📦 Bước 10: Đóng gói thành file .deb"
      if: success()
      run: |
        mkdir -p $GITHUB_WORKSPACE/tizentube-deb/DEBIAN
        mkdir -p $GITHUB_WORKSPACE/tizentube-deb/opt/tizentube
        
        echo -e "Package: tizentube-cobalt\nVersion: 2.0.2\nArchitecture: arm64\nMaintainer: starfish367\nDescription: Customized TizenTube for Armbian" > $GITHUB_WORKSPACE/tizentube-deb/DEBIAN/control
        
        cp -r $GITHUB_WORKSPACE/cobalt-build/src/out/evergreen-arm64_gold/* $GITHUB_WORKSPACE/tizentube-deb/opt/tizentube/
        
        dpkg-deb --build --root-owner-group $GITHUB_WORKSPACE/tizentube-deb
        mv $GITHUB_WORKSPACE/tizentube-deb.deb $GITHUB_WORKSPACE/tizentube-linux-arm64.deb

    - name: "🚀 Bước 11: Đẩy file .deb lên Release"
      if: success()
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v2.0.2-custom
        files: $GITHUB_WORKSPACE/tizentube-linux-arm64.deb
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
