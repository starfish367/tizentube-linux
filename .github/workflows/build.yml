name: TizenTube Linux ARM64 Auto-Build

on:
  workflow_dispatch: # Cho phép bạn bấm nút Run thủ công trên web GitHub

jobs:
  build-arm64:
    runs-on: ubuntu-latest

    steps:
    - name: 🧹 Dọn dẹp ổ cứng lấy 50GB trống
      uses: easimon/maximize-build-space@v10
      with:
        root-reserve-mb: 5120
        temp-reserve-mb: 1024
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'
        remove-codeql: 'true'
        remove-docker-images: 'true'

    - name: 📥 Checkout Code
      uses: actions/checkout@v4

    - name: 🛠️ Cài đặt Toolchain & ccache
      run: |
        sudo apt update
        sudo apt install -y git python3 python3-pip curl build-essential clang llvm lld ninja-build gcc-aarch64-linux-gnu g++-aarch64-linux-gnu ccache

    - name: 💾 Khôi phục Cache cũ (Nếu có)
      uses: actions/cache@v4
      with:
        path: ~/.ccache
        key: cobalt-arm64-ccache-${{ github.run_id }}-${{ github.run_number }}
        restore-keys: |
          cobalt-arm64-ccache-

    - name: ⚙️ Cấu hình ccache
      run: |
        ccache --max-size=8G
        ccache --set-config=compression=true

    - name: 🌐 Tải depot_tools của Google
      run: |
        git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git ~/depot_tools
        echo "PATH=$PATH:~/depot_tools" >> $GITHUB_ENV

    - name: 📦 Đồng bộ nguồn TizenTubeCobalt
      run: |
        mkdir -p ~/cobalt-build
        cd ~/cobalt-build
        gclient config --name=src https://github.com/reisxd/TizenTubeCobalt.git
        gclient sync --force --ops-to-write

    - name: 🏗️ Tạo cấu hình GN dùng ccache
      run: |
        cd ~/cobalt-build/src
        # Ép GN sử dụng ccache để tăng tốc các lần build sau
        python3 cobalt/build/gn.py -p linux-modular -c gold --target_arch=arm64 --args="ccache_enable=true"

    - name: 🔥 Tiến hành Biên dịch (Compile)
      run: |
        cd ~/cobalt-build/src
        # Dùng ccache bọc ngoài trình biên dịch
        export CC="ccache clang"
        export CXX="ccache clang++"
        ninja -j $(nproc) -C out/linux-modular_gold/ cobalt

    - name: 📦 Đóng gói thành file .deb
      if: success()
      run: |
        # Tạo cấu hình debian
        mkdir -p ~/tizentube-deb/DEBIAN
        mkdir -p ~/tizentube-deb/opt/tizentube
        
        # Viết file control
        echo -e "Package: tizentube-cobalt\nVersion: 2.0.2\nArchitecture: arm64\nMaintainer: you\nDescription: TizenTube for Armbian" > ~/tizentube-deb/DEBIAN/control
        
        # Copy sản phẩm đã build vào gói
        cp -r ~/cobalt-build/src/out/linux-modular_gold/* ~/tizentube-deb/opt/tizentube/
        
        # Đóng gói
        dpkg-deb --build --root-owner-group ~/tizentube-deb
        mv ~/tizentube-deb.deb ./tizentube-linux-arm64.deb

    - name: 🚀 Đẩy file .deb lên Release
      if: success()
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v2.0.2-armbian
        files: ./tizentube-linux-arm64.deb
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
