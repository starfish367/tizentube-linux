name: TizenTube Linux ARM64 Auto-Build (Fixed Paths)

on:
  workflow_dispatch: # Cho phép bấm nút chạy thủ công

jobs:
  build-arm64:
    runs-on: ubuntu-latest

    steps:
    - name: "🧹 Dọn dẹp ổ cứng lấy 100GB trống"
      uses: easimon/maximize-build-space@v10
      with:
        root-reserve-mb: 5120
        temp-reserve-mb: 1024
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'
        remove-codeql: 'true'
        remove-docker-images: 'true'

    - name: "📥 Bước 1: Tải Repo Mod của bạn (starfish367/tizentube-linux)"
      uses: actions/checkout@v4
      with:
        path: custom-repo

    - name: "🛠️ Bước 2: Cài đặt Toolchain & ccache"
      run: |
        sudo apt update
        sudo apt install -y git python3 python3-pip curl build-essential clang llvm lld ninja-build gcc-aarch64-linux-gnu g++-aarch64-linux-gnu ccache

    - name: "💾 Bước 3: Khôi phục Cache cũ từ Workspace"
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/.ccache
        key: cobalt-arm64-ccache-${{ github.run_id }}-${{ github.run_number }}
        restore-keys: |
          cobalt-arm64-ccache-

    - name: "⚙️ Bước 4: Cấu hình ccache nằm trong vùng 101GB"
      run: |
        export CCACHE_DIR="$GITHUB_WORKSPACE/.ccache"
        ccache --max-size=8G
        ccache --set-config=compression=true

    - name: "🌐 Bước 5: Tải depot_tools của Google"
      run: |
        git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git $HOME/depot_tools
        echo "$HOME/depot_tools" >> $GITHUB_PATH

    - name: "📦 Bước 6: Đồng bộ nguồn TizenTubeCobalt vào mỏ vàng 101GB"
      run: |
        mkdir -p $GITHUB_WORKSPACE/cobalt-build
        cd $GITHUB_WORKSPACE/cobalt-build
        
        # Clone 1 tầng ngọn để siêu nhẹ
        git clone --depth=1 https://github.com/reisxd/TizenTubeCobalt.git src
        
        # Tạo cấu hình .gclient cô lập platform rác
        cat <<EOF > .gclient
        solutions = [
          {
            "name": "src",
            "url": "https://github.com/reisxd/TizenTubeCobalt.git",
            "deps_file": "DEPS",
            "managed": False,
            "custom_deps": {
              "src/third_party/catapult": None,
              "src/third_party/android_deps": None,
              "src/content/test/data": None,
              "src/media/test/data": None,
              "src/third_party/blink/perf_tests": None,
              "src/third_party/hunspell_dictionaries": None,
            },
          },
        ]
        target_os = ["linux"]
        EOF
        
        gclient sync --force

    - name: "🛠️ Bước 7: TIẾN HÀNH ĐÈ FILE MOD trực tiếp bằng lệnh Workflow"
      run: |
        SED_TARGET="$GITHUB_WORKSPACE/cobalt-build/src"
        echo "⚙️ Vô hiệu hóa Auto-Update..."
        find $SED_TARGET -name "*.js" -exec sed -i 's/checkForUpdates/function(){return false;}/g' {} +
        find $SED_TARGET -name "*.js" -exec sed -i 's/checkUpdate/function(){return false;}/g' {} +
        find $SED_TARGET -name "*.js" -exec sed -i 's|api.github.com/repos/reisxd/TizenTubeCobalt/releases|api.github.com/repos/starfish367/tizentube-linux/releases|g' {} +
        
        if [ -f "$GITHUB_WORKSPACE/custom-repo/custom_files/key_mapping.cc" ]; then
          echo "🎮 Đang đè file key_mapping.cc tùy biến..."
          cp $GITHUB_WORKSPACE/custom-repo/custom_files/key_mapping.cc $GITHUB_WORKSPACE/cobalt-build/src/starboard/shared/x11/key_mapping.cc
        fi

    - name: "🏗️ Bước 8: Tạo cấu hình GN"
      run: |
        cd $GITHUB_WORKSPACE/cobalt-build/src
        python3 cobalt/build/gn.py -p linux-modular -c gold --target_arch=arm64 --args="ccache_enable=true"

    - name: "🔥 Bước 9: Bắt đầu Biên dịch (Compile dùng vùng 101GB)"
      run: |
        cd $GITHUB_WORKSPACE/cobalt-build/src
        export CCACHE_DIR="$GITHUB_WORKSPACE/.ccache"
        export CC="ccache clang"
        export CXX="ccache clang++"
        ninja -j $(nproc) -C out/linux-modular_gold/ cobalt

    - name: "📦 Bước 10: Đóng gói thành file .deb"
      if: success()
      run: |
        mkdir -p $GITHUB_WORKSPACE/tizentube-deb/DEBIAN
        mkdir -p $GITHUB_WORKSPACE/tizentube-deb/opt/tizentube
        
        echo -e "Package: tizentube-cobalt\nVersion: 2.0.2\nArchitecture: arm64\nMaintainer: starfish367\nDescription: Customized TizenTube for Armbian" > $GITHUB_WORKSPACE/tizentube-deb/DEBIAN/control
        
        cp -r $GITHUB_WORKSPACE/cobalt-build/src/out/linux-modular_gold/* $GITHUB_WORKSPACE/tizentube-deb/opt/tizentube/
        
        dpkg-deb --build --root-owner-group $GITHUB_WORKSPACE/tizentube-deb
        mv $GITHUB_WORKSPACE/tizentube-deb.deb $GITHUB_WORKSPACE/tizentube-linux-arm64.deb

    - name: "🚀 Bước 11: Đẩy file .deb lên Release"
      if: success()
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v2.0.2-custom
        files: $GITHUB_WORKSPACE/tizentube-linux-arm64.deb
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
