name: TizenTube Linux ARM64 Auto-Build (Customized)

on:
  workflow_dispatch: # Cho phép bấm nút chạy thủ công

jobs:
  build-arm64:
    runs-on: ubuntu-latest

    steps:
    - name: "🧹 Dọn dẹp ổ cứng lấy 50GB trống"
      uses: easimon/maximize-build-space@v10
      with:
        root-reserve-mb: 5120
        temp-reserve-mb: 1024
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'
        remove-codeql: 'true'
        remove-docker-images: 'true'

    - name: "📥 Bước 1: Tải Repo Mod của bạn (starfish367/tizentube-linux)"
      uses: actions/checkout@v4
      with:
        path: custom-repo # Tải vào thư mục riêng để tí nữa copy đè

    - name: "🛠️ Bước 2: Cài đặt Toolchain & ccache"
      run: |
        sudo apt update
        sudo apt install -y git python3 python3-pip curl build-essential clang llvm lld ninja-build gcc-aarch64-linux-gnu g++-aarch64-linux-gnu ccache

    - name: "💾 Bước 3: Khôi phục Cache cũ (Nếu có)"
      uses: actions/cache@v4
      with:
        path: ~/.ccache
        key: cobalt-arm64-ccache-${{ github.run_id }}-${{ github.run_number }}
        restore-keys: |
          cobalt-arm64-ccache-

    - name: "⚙️ Bước 4: Cấu hình ccache"
      run: |
        ccache --max-size=8G
        ccache --set-config=compression=true

    - name: "🌐 Bước 5: Tải depot_tools của Google (Đường dẫn tuyệt đối)"
      run: |
        git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git $HOME/depot_tools
        echo "$HOME/depot_tools" >> $GITHUB_PATH

    - name: "📦 Bước 6: Đồng bộ nguồn TizenTubeCobalt gốc (Bản sửa lỗi sync)"
      run: |
        mkdir -p ~/cobalt-build
        cd ~/cobalt-build
        
        # Tạo file cấu hình .gclient bằng tay để ÉP chỉ tải dependencies của Linux
        cat <<EOF > .gclient
        solutions = [
          {
            "name": "src",
            "url": "https://github.com/reisxd/TizenTubeCobalt.git",
            "deps_file": "DEPS",
            "managed": False,
            "custom_deps": {},
          },
        ]
        target_os = ["linux"]
        EOF
        
        # Tiến hành đồng bộ nguồn (bỏ qua lịch sử git cũ để nhẹ máy ảo hơn nữa)
        gclient sync --force

    - name: "🛠️ Bước 7: TIẾN HÀNH ĐÈ FILE MOD (Tắt Update & Sửa Phím)"
      run: |
        # 1. Chạy script tắt update
        chmod +x $GITHUB_WORKSPACE/custom-repo/custom_files/disable_update.sh
        $GITHUB_WORKSPACE/custom-repo/custom_files/disable_update.sh
        
        # 2. Đè file keymap mới vào nguồn Cobalt
        if [ -f "$GITHUB_WORKSPACE/custom-repo/custom_files/key_mapping.cc" ]; then
          echo "🎮 Đang đè file key_mapping.cc tùy biến..."
          cp $GITHUB_WORKSPACE/custom-repo/custom_files/key_mapping.cc ~/cobalt-build/src/starboard/shared/x11/key_mapping.cc
        fi

    - name: "🏗️ Bước 8: Tạo cấu hình GN dùng ccache"
      run: |
        cd ~/cobalt-build/src
        python3 cobalt/build/gn.py -p linux-modular -c gold --target_arch=arm64 --args="ccache_enable=true"

    - name: "🔥 Bước 9: Bắt đầu Biên dịch (Compile)"
      run: |
        cd ~/cobalt-build/src
        export CC="ccache clang"
        export CXX="ccache clang++"
        ninja -j $(nproc) -C out/linux-modular_gold/ cobalt

    - name: "📦 Bước 10: Đóng gói thành file .deb"
      if: success()
      run: |
        mkdir -p ~/tizentube-deb/DEBIAN
        mkdir -p ~/tizentube-deb/opt/tizentube
        
        echo -e "Package: tizentube-cobalt\nVersion: 2.0.2\nArchitecture: arm64\nMaintainer: starfish367\nDescription: Customized TizenTube for Armbian (No Update, Custom Keymap)" > ~/tizentube-deb/DEBIAN/control
        
        cp -r ~/cobalt-build/src/out/linux-modular_gold/* ~/tizentube-deb/opt/tizentube/
        
        dpkg-deb --build --root-owner-group ~/tizentube-deb
        mv ~/tizentube-deb.deb ./tizentube-linux-arm64.deb

    - name: "🚀 Bước 11: Đẩy file .deb tùy biến lên Release của starfish367"
      if: success()
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v2.0.2-custom
        files: ./tizentube-linux-arm64.deb
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
